<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin - Fragen</title>
  <script type="module" src="./js/admin.js"></script>
  <style>
    body { font-family: Arial; margin:0; padding:24px; background:#f5f7fb; }
    .card { max-width:900px; margin:0 auto; background:#fff; border-radius:12px; padding:20px; box-shadow:0 8px 24px rgba(0,0,0,0.08); }
    .top { display:flex; justify-content:space-between; gap:8px; align-items:center; flex-wrap:wrap; }
    .newRow { display:flex; gap:8px; margin:16px 0; }
    input[type="text"] { flex:1; padding:10px; font-size:16px; }
    button { padding:9px 12px; cursor:pointer; }
    .list { margin-top:10px; border:1px solid #e3e8ef; border-radius:8px; overflow:hidden; }
    .row { display:grid; grid-template-columns:50px 1fr auto auto; gap:8px; align-items:center; padding:10px; border-bottom:1px solid #eef2f7; }
    .row:last-child { border-bottom:none; }
    .num { color:#666; text-align:right; }
    .status { min-height:24px; color:#444; margin-top:10px; }
    .muted { color:#666; font-size:14px; }
  </style>
</head>
<body>
<div class="card">
  <div class="top">
    <h1>Admin: Fragen verwalten</h1>
    <a href="./host.html">Zur Host-Seite</a>
  </div>

  <p class="muted">Fragen werden live in Firestore gespeichert und sofort in Host/Vote verwendet.</p>

  <div class="newRow">
    <input id="newQuestion" type="text" placeholder="Neue Frage eingeben">
    <button id="addQuestion">Frage hinzufügen</button>
  </div>

  <div id="list" class="list"></div>
  <div id="status" class="status"></div>
</div>
</body>
</html>
