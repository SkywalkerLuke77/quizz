<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesamtergebnis – Hochzeitsquiz Lara &amp; Nathanael</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="results-page">
    <header class="results-page-header">
      <div class="ring-signature">
        <span class="ring ring--left"></span>
        <span class="ring ring--right"></span>
      </div>
      <div>
        <h1>Gesamtergebnis</h1>
        <p class="log-line">Session: <strong id="session-label"></strong></p>
      </div>
    </header>

    <div id="results-list" class="results-list"></div>

    <!-- Bild-Lightbox: wird per JS ein-/ausgeblendet -->
    <div id="lightbox" class="lightbox" hidden>
      <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Bild schließen">✕</button>
      <div class="lightbox-content">
        <img id="lightbox-image" class="lightbox-image" src="" alt="" />
        <div id="lightbox-placeholder" class="lightbox-placeholder" hidden>
          <div class="ring-signature">
            <span class="ring ring--left"></span>
            <span class="ring ring--right"></span>
          </div>
          <p>Kein Bild vorhanden</p>
        </div>
        <div class="lightbox-nav">
          <button id="lightbox-prev" class="lightbox-nav-btn" type="button" aria-label="Vorheriges Bild">←</button>
          <button id="lightbox-next" class="lightbox-nav-btn" type="button" aria-label="Nächstes Bild">→</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/results.js"></script>
</body>
</html>
