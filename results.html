<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesamtergebnis – Hochzeitsquiz Lara &amp; Nathanael</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="results-page">
    <header class="results-page-header">
      <div class="ring-signature">
        <span class="ring ring--left"></span>
        <span class="ring ring--right"></span>
      </div>
      <div>
        <h1>Gesamtergebnis</h1>
        <p class="log-line">Session: <strong id="session-label"></strong></p>
      </div>
    </header>

    <div id="results-list" class="results-list"></div>

    <div class="results-footer-link">
      <a id="link-to-ranking" href="ranking.html" class="btn btn-primary" style="text-decoration:none; display:inline-block;">🏆 Zur Rangliste</a>
    </div>

    <!-- Namens-Overlay: zeigt bei Klick auf einen Balken, wer wie abgestimmt hat -->
    <div id="names-overlay" class="names-overlay" hidden>
      <div class="names-overlay-panel">
        <button id="names-overlay-close" class="lightbox-close" type="button" aria-label="Schließen">✕</button>
        <h3 id="names-overlay-title" class="names-overlay-title"></h3>
        <div class="names-overlay-columns">
          <div class="names-column names-column--a">
            <h4 id="names-column-a-title" class="names-column-title"></h4>
            <ul id="names-list-a" class="names-list"></ul>
          </div>
          <div class="names-column names-column--b">
            <h4 id="names-column-b-title" class="names-column-title"></h4>
            <ul id="names-list-b" class="names-list"></ul>
          </div>
        </div>
      </div>
    </div>

    <!-- Bild-Lightbox: wird per JS ein-/ausgeblendet -->
    <div id="lightbox" class="lightbox" hidden>
      <button id="lightbox-close" class="lightbox-close" type="button" aria-label="Bild schließen">✕</button>
      <div class="lightbox-content">
        <img id="lightbox-image" class="lightbox-image" src="" alt="" />
        <div id="lightbox-placeholder" class="lightbox-placeholder" hidden>
          <div class="ring-signature">
            <span class="ring ring--left"></span>
            <span class="ring ring--right"></span>
          </div>
          <p>Kein Bild vorhanden</p>
        </div>
        <div class="lightbox-nav">
          <button id="lightbox-prev" class="lightbox-nav-btn" type="button" aria-label="Vorheriges Bild">←</button>
          <button id="lightbox-next" class="lightbox-nav-btn" type="button" aria-label="Nächstes Bild">→</button>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="js/results.js"></script>
</body>
</html>
