<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
  <title>Anmeldung – Hochzeitsquiz Lara &amp; Nathanael</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="login-page">
    <div class="login-card">
      <div class="ring-signature">
        <span class="ring ring--left"></span>
        <span class="ring ring--right"></span>
      </div>
      <h1>Wer kennt uns besser?</h1>
      <p class="subtitle">Gib deinen Namen ein und mach beim Hochzeitsquiz von Lara &amp; Nathanael mit.</p>

      <form id="login-form" class="login-form" autocomplete="off">
        <label for="name-input" class="visually-hidden">Dein Name</label>
        <input
          type="text"
          id="name-input"
          name="name"
          placeholder="Dein Name"
          maxlength="40"
          required
        />
        <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
        <button type="submit" id="submit-btn" class="btn btn-primary">Anmelden</button>
      </form>

      <div id="status-banner" class="login-status-banner" style="display:none;"></div>
    </div>
  </main>

  <script type="module" src="js/login.js"></script>
</body>
</html>
