<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderator – Hochzeitsquiz Lara &amp; Nathanael</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="host-page">
    <header class="host-header">
      <div class="ring-signature ring-signature--sm">
        <span class="ring ring--left"></span>
        <span class="ring ring--right"></span>
      </div>
      <div>
        <h1>Moderator-Steuerung</h1>
        <p class="log-line">Session: <strong id="session-label"></strong></p>
      </div>
      <a id="link-results" href="results.html" class="btn btn-outline" style="margin-left:auto; text-decoration:none;">📊 Gesamtergebnis</a>
      <a id="link-ranking" href="ranking.html" class="btn btn-outline" style="text-decoration:none;">🏆 Rangliste</a>
      <a href="sessions.html" class="btn btn-outline" style="text-decoration:none;">🗂️ Sessions</a>
    </header>

    <div class="host-grid">
      <div class="stat-card">
        <p class="stat-label">Status</p>
        <p class="stat-value"><span id="status-pill" class="status-pill">–</span></p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Teilnehmer</p>
        <p class="stat-value" id="participant-count-value">0</p>
      </div>
      <div class="stat-card">
        <p class="stat-label">Abgegebene Stimmen (aktuelle Frage)</p>
        <p class="stat-value" id="vote-count-value">0</p>
      </div>
    </div>

    <section class="host-section">
      <h3>Aktuelle Frage</h3>
      <div id="question-preview" class="host-question-preview">–</div>
      <div class="host-btn-row">
        <button id="btn-prev-question" class="btn btn-outline" type="button">← Vorherige Frage</button>
        <button id="btn-next-question" class="btn btn-outline" type="button">Nächste Frage →</button>
      </div>
    </section>

    <section class="host-section">
      <h3>Ablauf</h3>
      <div class="host-btn-row">
        <button id="btn-open-registration" class="btn btn-secondary" type="button">Anmeldung öffnen</button>
        <button id="btn-close-registration" class="btn btn-outline" type="button">Anmeldung schließen</button>
      </div>
      <br />
      <div class="host-btn-row">
        <button id="btn-start-quiz" class="btn btn-primary" type="button">Umfrage starten</button>
        <button id="btn-close-voting" class="btn btn-outline" type="button">Abstimmung schließen</button>
        <button id="btn-show-results" class="btn btn-primary" type="button">Ergebnis anzeigen</button>
      </div>
    </section>

    <section class="host-section">
      <h3>Zurücksetzen</h3>
      <div class="host-btn-row">
        <button id="btn-reset-participants" class="btn btn-danger" type="button">Teilnehmer zurücksetzen</button>
        <button id="btn-reset-votes" class="btn btn-danger" type="button">Stimmen zurücksetzen</button>
        <button id="btn-reset-session" class="btn btn-danger" type="button">Komplette Session zurücksetzen</button>
      </div>
    </section>

    <p id="log-line" class="log-line"></p>
  </main>

  <script type="module" src="js/host.js"></script>
</body>
</html>
