<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Abstimmen – Hochzeitsquiz Lara &amp; Nathanael</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="vote-page">
    <header class="vote-header">
      <div class="ring-signature ring-signature--sm">
        <span class="ring ring--left"></span>
        <span class="ring ring--right"></span>
      </div>
      <p class="participant-name">Angemeldet als <strong id="participant-name"></strong></p>
    </header>

    <section id="waiting-view" class="vote-waiting">
      <div class="ring-signature">
        <span class="ring ring--left"></span>
        <span class="ring ring--right"></span>
      </div>
      <p id="waiting-text">Bitte warte auf den Moderator …</p>
    </section>

    <div id="question-wrap" class="vote-question-wrap" style="display:none;">
      <p id="question-text" class="vote-question"></p>
    </div>

    <div id="buttons-wrap" class="vote-buttons" style="display:none;">
      <button id="btn-a" class="vote-btn vote-btn--a" type="button">
        <span class="vote-btn-label"></span>
        <span class="vote-btn-sub">antippen zum Abstimmen</span>
      </button>
      <button id="btn-b" class="vote-btn vote-btn--b" type="button">
        <span class="vote-btn-label"></span>
        <span class="vote-btn-sub">antippen zum Abstimmen</span>
      </button>
    </div>

    <p id="confirmation" class="vote-confirmation" style="display:none;"></p>
  </div>

  <script type="module" src="js/vote.js"></script>
</body>
</html>
